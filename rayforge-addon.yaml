# The unique identifier for your addon. Must be a valid Python module name (letters, numbers, and underscores only, cannot start with a number). (Required)
name: "my_awesome_addon"

# The human-readable name shown in the UI. (Required)
display_name: "My Awesome Addon"

# A brief, one-sentence description of what your addon does. (Required)
description: "A template addon demonstrating code and asset provisioning."

# The plugin API version. Must match the version expected by Rayforge.
api_version: 1

# The Python addon versions required by this addon.
depends:
  - rayforge>=0.27.0

author:
  name: "Me Author"
  email: "you@invalid.com"

# The license under which your addon is distributed (optional).
# Use SPDX license identifiers (e.g., MIT, Apache-2.0, GPL-3.0, BSL-1.1).
license:
  name: "MIT"

# ---------------------------------------------------------------------------
# The 'provides' section tells Rayforge what your addon contains.
# You can have 'backend', 'frontend', 'assets', or a combination.
# Delete any section you don't need, but at least one is required.
# ---------------------------------------------------------------------------
provides:
  # Backend module: loaded in both worker and main processes.
  # Use this for producers, steps, and other non-UI components.
  # The module must contain hook implementations using @hookimpl.
  backend: "my_addon.backend"

  # Frontend module: loaded only in the main process.
  # Use this for UI widgets and other GTK components.
  # The module must contain hook implementations using @hookimpl.
  frontend: "my_addon.frontend"

  # If your addon includes assets, list their type and location here.
  assets:
    - type: "material"
      # The 'path' is relative to the root of this repository.
      path: "./assets/materials/"
      description: "Materials included with this addon."
